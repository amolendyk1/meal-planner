<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meal Planning App</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <h1>Meal Planning App</h1>
    </header>

    <nav class="top-nav">
      <button class="nav-link active" data-view="planner">
        Weekly Planner
      </button>
      <button class="nav-link" data-view="recipes">Recipe Library</button>
      <button class="nav-link" data-view="pantry">Pantry & Grocery</button>
      <button class="nav-link" data-view="nutrition">
        Nutrition & Suggestions
      </button>
    </nav>

    <main>
      <!-- WEEKLY PLANNER -->
      <section id="view-planner" class="app-view active">
        <div class="card">
          <h2>Weekly Planner</h2>
          <div id="planner-grid"></div>
        </div>
      </section>

      <!-- RECIPE LIBRARY -->
      <section id="view-recipes" class="app-view">
        <div class="card">
          <h2>Add Recipe</h2>
          <form id="recipe-form">
            <input id="recipe-name" placeholder="Recipe name" required />
            <input
              id="recipe-ingredients"
              placeholder="Ingredients (comma separated)"
              required
            />
            <input
              id="recipe-calories"
              type="number"
              placeholder="Calories per serving"
              required
            />
            <input
              id="recipe-protein"
              type="number"
              placeholder="Protein (g per serving)"
              required
            />
            <button type="submit">Add Recipe</button>
          </form>
        </div>

        <div class="card">
          <h2>Recipe Library</h2>
          <div id="recipe-list"></div>
        </div>
      </section>

      <!-- PANTRY + GROCERY -->
      <section id="view-pantry" class="app-view">
        <div class="card">
          <h2>Pantry</h2>
          <input
            id="pantry-input"
            placeholder="Add ingredients (comma separated)"
          />
          <button id="add-to-pantry">Add to Pantry</button>
          <div id="current-pantry"></div>
        </div>

        <div class="card">
          <h2>Grocery List</h2>
          <input id="grocery-input" placeholder="Add grocery item" />
          <button id="add-grocery">Add to List</button>
          <ul id="grocery-list"></ul>
        </div>
      </section>

      <!-- NUTRITION + SUGGESTIONS -->
      <section id="view-nutrition" class="app-view">
        <div class="card">
          <h2>Nutrition Summary</h2>
          <label>Portion multiplier:</label>
          <input id="portion-multiplier" type="number" step="0.1" value="1" />
          <button id="update-nutrition">Update Nutrition</button>
          <div id="nutrition-summary"></div>
        </div>

        <div class="card">
          <h2>Meal Suggestions</h2>
          <div id="suggestions"></div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
